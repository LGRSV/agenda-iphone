<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#10141c">
<title>Agenda Lagares</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#10141c}iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#10141c}
</style>
</head>
<body>
<iframe id="agenda" src="./?v=8" title="Agenda Lagares"></iframe>
<script>
(()=>{
 const frame=document.getElementById('agenda');
 const selectors='.edit,.mini-edit,.small-edit,.edit-btn,[data-edit]';
 const taskSelectors='.task-row,.row,.block-task,.reminder,.work-reminder,.outside-task';
 const css=`
  #ag-v9-status{display:grid!important;grid-template-columns:1fr 1fr!important;gap:8px!important;margin:0 0 14px!important;padding:0!important;background:transparent!important;border:0!important;box-shadow:none!important}
  #ag-v9-status button{display:flex!important;align-items:center!important;justify-content:space-between!important;min-height:68px!important;padding:12px 14px!important;border:1px solid var(--line)!important;border-radius:16px!important;background:var(--card)!important;color:var(--ink,var(--text))!important;text-align:left!important;box-shadow:var(--shadow)!important;cursor:pointer!important}
  #ag-v9-status span{display:block!important;color:var(--muted)!important;font-size:12px!important;font-weight:760!important}
  #ag-v9-status strong{display:block!important;margin-top:3px!important;font-size:25px!important;letter-spacing:-.04em!important}
  #ag-v9-status i{display:grid!important;place-items:center!important;width:31px!important;height:31px!important;border-radius:10px!important;background:var(--orange2,#4a361b)!important;color:var(--orange,#ffc170)!important;font-style:normal!important;font-size:17px!important}
  #ag-v9-status .agdone i{background:var(--green2,#173f32)!important;color:var(--green,#52d69f)!important}
  ${selectors}{min-width:48px!important;min-height:40px!important;padding:0 7px!important;border-radius:10px!important;font-size:12px!important;font-weight:800!important}
  .ag-pending{position:relative!important;box-shadow:inset 3px 0 0 var(--orange,#ffc170)!important}
  .agflag{display:inline-flex!important;align-items:center!important;gap:4px!important;margin:0 0 0 6px!important;padding:2px 6px!important;border-radius:999px!important;background:var(--orange2,#4a361b)!important;color:var(--orange,#ffc170)!important;font-size:10px!important;font-weight:850!important;line-height:1.2!important;vertical-align:middle!important;text-decoration:none!important}
 `;
 function data(){
   try{return JSON.parse(frame.contentWindow.localStorage.getItem('agenda_lagares_v3')||'[]')}catch{return []}
 }
 function addStyle(doc){
   if(doc.getElementById('ag-v9-style'))return;
   const style=doc.createElement('style');style.id='ag-v9-style';style.textContent=css;doc.head.append(style);
 }
 function addDurations(doc){
   doc.querySelectorAll('select[id*="duration" i],select[name*="duration" i]').forEach(select=>{
     [['5','5 min'],['10','10 min']].reverse().forEach(([value,label])=>{
       if(![...select.options].some(option=>option.value===value)){
         const option=doc.createElement('option');option.value=value;option.textContent=label;select.insertBefore(option,select.options[0]||null);
       }
     });
   });
 }
 function pending(card){
   return !card.classList.contains('done')&&!card.classList.contains('is-done')&&!card.classList.contains('completed');
 }
 function flagTasks(doc){
   doc.querySelectorAll(taskSelectors).forEach(card=>{
     if(!pending(card)){card.classList.remove('ag-pending');return}
     card.classList.add('ag-pending');
     if(card.querySelector('.agflag'))return;
     const target=card.querySelector('.task,.task-title,.task-name,.reminder-toggle div,.block-task div,.outside-toggle,.wtask');
     if(!target)return;
     const flag=doc.createElement('span');flag.className='agflag';flag.textContent='⚑ Pendente';target.append(flag);
   });
 }
 function openList(doc,filter){
   const tab=[...doc.querySelectorAll('[data-tab]')].find(button=>button.dataset.tab==='lista'||button.dataset.tab==='list');
   if(tab)tab.click();
   const filterButton=[...doc.querySelectorAll('[data-filter]')].find(button=>button.dataset.filter===filter);
   if(filterButton)filterButton.click();
 }
 function counters(doc){
   const tasks=data();const done=tasks.filter(task=>task.done).length;const pending=tasks.length-done;
   let box=doc.getElementById('ag-v9-status');
   if(!box){
     box=doc.createElement('section');box.id='ag-v9-status';
     box.innerHTML='<button data-ag-filter="pending"><div><span>Pendentes</span><strong>0</strong></div><i>⚑</i></button><button class="agdone" data-ag-filter="done"><div><span>Concluídas</span><strong>0</strong></div><i>✓</i></button>';
     const anchor=doc.querySelector('.summary,.overview');
     if(anchor)anchor.insertAdjacentElement('afterend',box);else doc.querySelector('.app,main')?.prepend(box);
     box.addEventListener('click',event=>{const button=event.target.closest('[data-ag-filter]');if(button)openList(doc,button.dataset.agFilter)});
   }
   const values=box.querySelectorAll('strong');if(values[0])values[0].textContent=pending;if(values[1])values[1].textContent=done;
 }
 function apply(){
   const doc=frame.contentDocument;if(!doc||!doc.body)return;
   addStyle(doc);addDurations(doc);flagTasks(doc);counters(doc);
 }
 frame.addEventListener('load',()=>{
   apply();
   const doc=frame.contentDocument;
   new MutationObserver(()=>requestAnimationFrame(apply)).observe(doc.body,{childList:true,subtree:true});
   setInterval(apply,900);
 });
})();
</script>
</body>
</html>
