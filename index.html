<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">

<title>Agenda Inteligente</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#171b26;--muted:#667085;--line:#e3e7ef;--blue:#1d4ed8;--blue2:#eaf0ff;--red:#b42318;--red2:#fff0ef;--green:#13795b;--green2:#e7f7ef;--purple:#6d28d9;--purple2:#f2ecff;--orange:#9a5a00;--orange2:#fff3dc}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:max(18px,env(safe-area-inset-top)) 16px calc(95px + env(safe-area-inset-bottom))}.app{max-width:620px;margin:auto}button,input,select{font:inherit}.top{display:flex;align-items:center;justify-content:space-between;margin:3px 2px 18px}.eyebrow{margin:0 0 4px;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}h1{margin:0;font-size:34px;letter-spacing:-.05em}.icon,.filter,.ghost,.delete,.fab,.primary,.secondary{cursor:pointer}.icon{width:44px;height:44px;border:1px solid var(--line);border-radius:14px;background:var(--card);font-size:19px}.summary,.insights,.day,.sheet,.menu{background:var(--card);border:1px solid var(--line);box-shadow:0 8px 24px #1822300d}.summary{display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;border-color:#dce5ff;border-radius:22px;padding:18px;margin-bottom:16px;background:linear-gradient(135deg,#fff,#edf3ff)}.summary p{margin:0}.label{color:var(--muted);font-size:13px;font-weight:650}.big{margin-top:6px!important;font-size:26px;font-weight:780;letter-spacing:-.04em}.big span{font-size:15px;color:var(--muted);font-weight:650;letter-spacing:0}.detail{margin-top:5px!important;color:var(--muted);font-size:12.5px}.ring{--p:0%;display:grid;place-items:center;width:66px;height:66px;border-radius:50%;background:conic-gradient(var(--blue) var(--p),#dce3f4 0)}.ring:before{position:absolute;content:"";width:52px;height:52px;border-radius:50%;background:#fff}.ring b{z-index:1;font-size:13px}.insights{overflow:hidden;border-color:#e2dafa;border-radius:20px;margin-bottom:18px}.insight-head{display:flex;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid #ece8fb;background:linear-gradient(135deg,#fcfbff,#f5f1ff)}h2{margin:0;font-size:16px;letter-spacing:-.02em}.sub{margin:4px 0 0;color:var(--muted);font-size:12.5px;line-height:1.35}.ghost{border:1px solid #ddd4fa;border-radius:10px;background:#fff;color:var(--purple);font-size:12px;font-weight:700;padding:0 10px}.tips{display:grid;gap:9px;padding:10px}.tip{display:grid;grid-template-columns:32px 1fr;gap:10px;padding:10px;border-radius:14px;background:#f7f8fc}.tip i{display:grid;place-items:center;width:32px;height:32px;border-radius:10px;background:#fff;font-style:normal}.tip.conflict i{background:var(--red2)}.tip.prep i{background:var(--purple2)}.tip.reminder i{background:var(--orange2)}.tip.balance i{background:var(--blue2)}.tip.smart i{background:var(--green2)}.tip h3{margin:1px 0 3px;font-size:13px}.tip p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.4}.empty-tip{color:var(--muted);font-size:13px;line-height:1.4;padding:5px 4px}.filters{display:flex;gap:8px;overflow:auto;margin:0 2px 18px}.filter{white-space:nowrap;padding:9px 14px;border:1px solid var(--line);border-radius:999px;background:var(--card);color:var(--muted);font-size:13px;font-weight:700}.filter.on{border-color:var(--blue);background:var(--blue);color:#fff}.agenda{display:grid;gap:16px}.day{overflow:hidden;border-radius:20px}.day-head{display:flex;justify-content:space-between;gap:12px;padding:16px;border-bottom:1px solid var(--line);background:#fbfcff}.day-title{margin:0;font-size:17px}.day-sub{margin:4px 0 0;color:var(--muted);font-size:12.5px}.count{padding:5px 9px;border-radius:999px;background:#f1f3f7;color:var(--muted);font-size:12px;font-weight:700;height:max-content}.rows{padding:7px 8px}.row{display:grid;grid-template-columns:27px 1fr 30px;gap:10px;align-items:start;padding:10px 8px;border-radius:14px;cursor:pointer}.row:hover{background:#f7f8fc}.check{width:23px;height:23px;margin-top:2px;border:2px solid #aeb6c7;border-radius:8px}.row.done .check{border-color:var(--green);background:var(--green);position:relative}.row.done .check:after{content:"";position:absolute;top:3px;left:6px;width:6px;height:10px;border:solid white;border-width:0 2px 2px 0;transform:rotate(45deg)}.title{display:block;font-size:14px;font-weight:630;line-height:1.35;overflow-wrap:anywhere}.row.done .title{color:#89909d;text-decoration:line-through}.meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}.tag{padding:3px 7px;border-radius:999px;background:#eef1f6;color:#657083;font-size:10.5px;font-weight:720}.tag.work{background:var(--blue2);color:var(--blue)}.tag.study{background:var(--purple2);color:var(--purple)}.tag.health{background:var(--green2);color:var(--green)}.tag.high{background:var(--red2);color:var(--red)}.mini-tip{margin-top:8px;color:#76571d;font-size:11.5px;line-height:1.35}.delete{width:30px;height:30px;border:0;border-radius:9px;background:transparent;color:#8d96a7;font-size:19px}.empty{padding:42px 20px;border:1px dashed #cbd3e1;border-radius:20px;background:#ffffffaa;color:var(--muted);text-align:center}.empty b{display:block;color:var(--ink);margin-bottom:5px}.fab{position:fixed;right:max(18px,calc((100vw - 620px)/2));bottom:calc(20px + env(safe-area-inset-bottom));border:0;border-radius:16px;background:var(--blue);color:white;box-shadow:0 12px 28px #1d4ed84d;min-height:52px;padding:0 19px;font-weight:740}.backdrop{position:fixed;z-index:10;inset:0;display:none;align-items:end;background:#0f172a57;backdrop-filter:blur(2px)}.backdrop.open{display:flex}.sheet{width:100%;max-height:calc(100vh - 22px);overflow:auto;border-radius:24px 24px 0 0;padding:12px 16px calc(18px + env(safe-area-inset-bottom))}.grab{width:42px;height:4px;border-radius:9px;background:#d6dce6;margin:2px auto 16px}.sheet h2{font-size:21px}.field{display:grid;gap:7px;margin-top:13px}.field label{color:var(--muted);font-size:12px;font-weight:720}.field input,.field select{min-height:47px;padding:11px 12px;border:1px solid #d9dfeb;border-radius:13px;background:#fff;color:var(--ink)}.field input:focus,.field select:focus{outline:3px solid var(--blue2);border-color:var(--blue)}.twocol{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:grid;grid-template-columns:1fr 1.35fr;gap:10px;margin-top:18px}.primary,.secondary{min-height:48px;border-radius:13px;font-size:14px;font-weight:740}.primary{border:1px solid var(--blue);background:var(--blue);color:#fff}.secondary{border:1px solid var(--line);background:#fff;color:var(--ink)}.menu-back{position:fixed;z-index:11;inset:0;display:none;background:#0f172a35}.menu-back.open{display:block}.menu{position:fixed;z-index:12;display:none;top:max(70px,calc(env(safe-area-inset-top) + 58px));left:16px;right:16px;max-width:620px;margin:auto;border-radius:16px;overflow:hidden}.menu.open{display:block}.menu button{display:block;width:100%;padding:14px 16px;border:0;border-bottom:1px solid var(--line);background:#fff;text-align:left;font-size:14px;font-weight:670}.menu button:last-child{border-bottom:0;color:var(--red)}.toast{position:fixed;z-index:20;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translate(-50%,12px);opacity:0;pointer-events:none;transition:.18s;padding:11px 16px;border-radius:999px;background:#1c2333;color:white;font-size:13px;font-weight:650}.toast.show{opacity:1;transform:translate(-50%,0)}@media(min-width:700px){body{padding-top:32px}.sheet{max-width:620px;margin:auto}.fab{right:calc((100vw - 620px)/2)}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div><p class="eyebrow" id="today">Agenda inteligente</p><h1>Minha agenda</h1></div><button class="icon" id="menuBtn" aria-label="Mais opções">•••</button></header>
<section class="summary"><div><p class="label">Progresso geral</p><p class="big"><span id="done">0</span> de <span id="total">0</span> <span>concluídas</span></p><p class="detail" id="detail">Organize seu dia com calma.</p></div><div class="ring" id="ring"><b id="pct">0%</b></div></section>
<section class="insights"><header class="insight-head"><div><h2>Sugestões inteligentes</h2><p class="sub">Análise local por regras. Nada muda sem sua decisão.</p></div><button class="ghost" id="refresh">Atualizar</button></header><div class="tips" id="tips"></div></section>
<nav class="filters"><button class="filter on" data-f="all">Todas</button><button class="filter" data-f="today">Hoje</button><button class="filter" data-f="pending">Pendentes</button><button class="filter" data-f="done">Concluídas</button></nav>
<section class="agenda" id="agenda"></section>
</main>
<button class="fab" id="addBtn">＋ Nova atividade</button>
<div class="backdrop" id="backdrop"><form class="sheet" id="form"><div class="grab"></div><h2>Adicionar atividade</h2><p class="sub">Horário e duração ajudam nas sugestões.</p><div class="field"><label for="text">O que você precisa fazer?</label><input id="text" maxlength="180" placeholder="Ex.: Reunião sobre o VERA" required></div><div class="twocol"><div class="field"><label for="date">Data</label><input id="date" type="date" required></div><div class="field"><label for="time">Horário</label><input id="time" type="time"></div></div><div class="twocol"><div class="field"><label for="duration">Duração</label><select id="duration"><option value="30">30 min</option><option value="60" selected>1 hora</option><option value="90">1h30</option><option value="120">2 horas</option><option value="180">3 horas</option></select></div><div class="field"><label for="priority">Prioridade</label><select id="priority"><option value="baixa">Baixa</option><option value="normal" selected>Normal</option><option value="alta">Alta</option></select></div></div><div class="field"><label for="category">Categoria</label><select id="category"><option value="auto" selected>Automática, conforme o texto</option><option>Trabalho</option><option>Faculdade</option><option>Pessoal</option><option>Casa</option><option>Saúde</option><option>Financeiro</option></select></div><div class="actions"><button class="secondary" type="button" id="cancel">Cancelar</button><button class="primary">Adicionar e analisar</button></div></form></div>
<div class="menu-back" id="menuBack"></div><aside class="menu" id="menu"><button id="test">Carregar cenário de teste</button><button id="clear">Limpar todas as atividades</button></aside><div class="toast" id="toast"></div>
<script>
(()=>{const K='agenda_inteligente_v2',L=['agenda_profissional_iphone_v1','agenda_tasks'];let filter='all',tasks=load(),tips=[],timer;const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],today=()=>{let d=new Date(),o=d.getTimezoneOffset()*6e4;return new Date(d-o).toISOString().slice(0,10)},id=()=>Date.now()+'-'+Math.random().toString(36).slice(2,8),esc=s=>{let d=document.createElement('div');d.textContent=s||'';return d.innerHTML},min=t=>/^\d\d:\d\d$/.test(t||'')?+t.slice(0,2)*60+ +t.slice(3):null,clock=m=>String(Math.max(0,Math.floor(m/60))%24).padStart(2,'0')+':'+String(Math.max(0,m)%60).padStart(2,'0'),dur=m=>m<60?m+' min':Math.floor(m/60)+'h'+(m%60?String(m%60).padStart(2,'0'):''),cat=t=>{t=(t||'').toLowerCase();if(/reunião|relatório|projeto|vera|energisa|sgm|scada|planilha|cliente|e-mail|email|workshop|treinamento/.test(t))return'Trabalho';if(/faculdade|aula|prova|estudar|estudo|seminário/.test(t))return'Faculdade';if(/médico|consulta|academia|caminhada|dentista|remédio|veterinário|saúde/.test(t))return'Saúde';if(/pagar|cobrar|pix|boleto|cartão|conta|financiamento/.test(t))return'Financeiro';if(/lavar|dobrar|limpar|arrumar|casa|roupa/.test(t))return'Casa';return'Pessoal'},norm=x=>x&&x.date&&x.text?{id:String(x.id||id()),date:String(x.date),time:/^\d\d:\d\d$/.test(x.time||'')?x.time:'',duration:Math.max(15,+x.duration||60),text:String(x.text).trim(),category:x.category||cat(x.text),priority:['alta','normal','baixa'].includes(x.priority)?x.priority:'normal',done:!!x.done}:null,scenario=()=>{let d=today();return[{id:id(),date:d,time:'14:00',duration:90,text:'Reunião sobre o VERA',category:'Trabalho',priority:'alta',done:false},{id:id(),date:d,time:'15:00',duration:90,text:'Revisar pendências do projeto',category:'Trabalho',priority:'normal',done:false},{id:id(),date:d,time:'18:00',duration:120,text:'Organizar arquivos da semana',category:'Trabalho',priority:'normal',done:false},{id:id(),date:d,time:'',duration:60,text:'Comprar material para escritório',category:'Pessoal',priority:'baixa',done:false}]};function legacy(a){if(!Array.isArray(a))return null;let r=a.map(x=>{if(!x||!x.text)return null;let d=x.date;if(!d&&x.day){let[q,w]=String(x.day).split('/').map(Number);if(q&&w)d='2026-'+String(w).padStart(2,'0')+'-'+String(q).padStart(2,'0')}return norm({...x,date:d})}).filter(Boolean);return r.length?r:null}function load(){try{let a=JSON.parse(localStorage.getItem(K)||'null');if(Array.isArray(a))return a.map(norm).filter(Boolean);for(let k of L){let a=legacy(JSON.parse(localStorage.getItem(k)||'null'));if(a)return a}}catch(e){}return scenario()}function save(){try{localStorage.setItem(K,JSON.stringify(tasks))}catch(e){}}function fmt(d){let a=d.split('-').map(Number),x=new Date(a[0],a[1]-1,a[2]);return[x.toLocaleDateString('pt-BR',{day:'2-digit',month:'long'}),x.toLocaleDateString('pt-BR',{weekday:'long',year:'numeric'}).replace(/^./,c=>c.toUpperCase())]}function typeIcon(t){return{conflict:'⚠️',prep:'🧰',reminder:'⏰',balance:'⚖️',smart:'✨'}[t]||'💡'}function analyze(){let out=[],a=tasks.filter(x=>!x.done),by={};a.forEach(x=>(by[x.date]??=[]).push(x));for(let[d,ls]of Object.entries(by)){let s=ls.filter(x=>min(x.time)!==null).sort((a,b)=>min(a.time)-min(b.time));ls.filter(x=>!x.time).slice(0,2).forEach(x=>out.push({type:'smart',task:x.id,title:'Defina um horário',body:'“'+x.text+'” está sem horário. Definir um período ajuda a não esquecer.'}));for(let i=0;i<s.length-1;i++){let x=s[i],y=s[i+1],end=min(x.time)+x.duration;if(min(y.time)<end)out.push({type:'conflict',task:x.id,other:y.id,title:'Conflito de horário',body:'“'+x.text+'” termina às '+clock(end)+', mas “'+y.text+'” começa às '+y.time+'.'})}let sum=ls.reduce((n,x)=>n+x.duration,0);if(ls.length>=5||sum>=360)out.push({type:'balance',title:'Dia com carga alta',body:fmt(d)[0]+' tem '+ls.length+' atividades previstas ('+dur(sum)+' estimadas). Proteja pausas e mova o que for menos urgente.'})}a.forEach(x=>{if(x.duration>=120)out.push({type:'smart',task:x.id,title:'Quebre em etapas menores',body:'“'+x.text+'” está estimada em '+dur(x.duration)+'. Divida em duas ou mais etapas.'});if(/reunião|meeting|aula|faculdade|treinamento|workshop|apresentação|entrevista|consulta/i.test(x.text)&&x.time)out.push({type:'prep',task:x.id,title:'Reserve preparação',body:'Para “'+x.text+'”, bloqueie 30 min antes ('+clock(min(x.time)-30)+') para materiais ou deslocamento.'});if(x.priority==='alta'||/pagar|cobrar|buscar|comprar|enviar|entregar|consulta|reunião/i.test(x.text))out.push({type:'reminder',task:x.id,title:'Lembrete recomendado',body:'Crie um lembrete para “'+x.text+'” '+(x.time?'às '+clock(min(x.time)-60):'no início do dia')+'.'})});let rank={conflict:1,prep:2,reminder:3,balance:4,smart:5};return out.sort((a,b)=>rank[a.type]-rank[b.type]).slice(0,10)}function renderTips(){tips=analyze();$('#tips').innerHTML=tips.length?tips.map(x=>'<article class="tip '+x.type+'"><i>'+typeIcon(x.type)+'</i><div><h3>'+esc(x.title)+'</h3><p>'+esc(x.body)+'</p></div></article>').join(''):'<div class="empty-tip">Sua agenda está equilibrada por enquanto. Inclua horário e duração para análises mais detalhadas.</div>'}function classCat(c){return c==='Trabalho'?'work':c==='Faculdade'?'study':c==='Saúde'?'health':''}function taskTips(x){return tips.filter(t=>t.task===x.id||t.other===x.id).slice(0,2).map(t=>'<div class="mini-tip"><b>'+esc(t.title)+':</b> '+esc(t.body)+'</div>').join('')}function visible(){let d=today();return tasks.filter(x=>filter==='all'||filter==='today'&&x.date===d||filter==='pending'&&!x.done||filter==='done'&&x.done)}function render(){renderTips();let total=tasks.length,done=tasks.filter(x=>x.done).length,p=total?Math.round(done/total*100):0,pending=tasks.filter(x=>x.date===today()&&!x.done).length;$('#done').textContent=done;$('#total').textContent=total;$('#pct').textContent=p+'%';$('#ring').style.setProperty('--p',p+'%');$('#detail').textContent=pending?pending+' atividade'+(pending>1?'s':'')+' pendente'+(pending>1?'s':'')+' hoje.':'Nenhuma pendência para hoje.';let v=visible().sort((a,b)=>a.date.localeCompare(b.date)||(min(a.time)??9999)-(min(b.time)??9999));if(!v.length){$('#agenda').innerHTML='<div class="empty"><b>Nenhuma atividade por aqui</b>Tente outro filtro ou adicione uma nova atividade.</div>';return}let g={};v.forEach(x=>(g[x.date]??=[]).push(x));$('#agenda').innerHTML=Object.keys(g).sort().map(d=>{let ls=g[d],all=tasks.filter(x=>x.date===d),f=fmt(d);return'<article class="day"><header class="day-head"><div><h2 class="day-title">'+f[0]+'</h2><p class="day-sub">'+f[1]+'</p></div><span class="count">'+all.filter(x=>x.done).length+'/'+all.length+'</span></header><div class="rows">'+ls.map(x=>{let when=x.time?x.time+'–'+clock(min(x.time)+x.duration):'Sem horário',pri=x.priority==='alta'?'Alta prioridade':x.priority==='baixa'?'Baixa prioridade':'Prioridade normal';return'<div class="row '+(x.done?'done':'')+'" data-toggle="'+x.id+'" role="button" tabindex="0"><span class="check"></span><div><span class="title">'+esc(x.text)+'</span><div class="meta"><span class="tag">'+when+'</span><span class="tag">'+dur(x.duration)+'</span><span class="tag '+classCat(x.category)+'">'+esc(x.category)+'</span><span class="tag '+(x.priority==='alta'?'high':'')+'">'+pri+'</span></div>'+(!x.done?taskTips(x):'')+'</div><button class="delete" data-del="'+x.id+'" aria-label="Excluir">×</button></div>'}).join('')+'</div></article>'}).join('')}function toast(s){$('#toast').textContent=s;$('#toast').classList.add('show');clearTimeout(timer);timer=setTimeout(()=>$('#toast').classList.remove('show'),2400)}function open(){closeMenu();$('#form').reset();$('#date').value=today();$('#duration').value='60';$('#priority').value='normal';$('#category').value='auto';$('#backdrop').classList.add('open');setTimeout(()=>$('#text').focus(),80)}function close(){$('#backdrop').classList.remove('open');$('#form').reset()}function closeMenu(){$('#menu').classList.remove('open');$('#menuBack').classList.remove('open')}$('#today').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'short'}).replace(/^./,c=>c.toUpperCase());$('#addBtn').onclick=open;$('#cancel').onclick=close;$('#menuBtn').onclick=()=>{$('#menu').classList.add('open');$('#menuBack').classList.add('open')};$('#menuBack').onclick=closeMenu;$('#backdrop').onclick=e=>{if(e.target===$('#backdrop'))close()};$('#refresh').onclick=()=>{render();toast('Sugestões atualizadas')};$('#form').onsubmit=e=>{e.preventDefault();let text=$('#text').value.trim(),date=$('#date').value,time=$('#time').value||'',duration=+$('#duration').value||60,category=$('#category').value,priority=$('#priority').value;if(!text||!date)return;if(tasks.some(x=>x.date===date&&x.time===time&&x.text.toLowerCase()===text.toLowerCase()))return toast('Essa atividade já existe nesse horário');tasks.push({id:id(),date,time,duration,text,category:category==='auto'?cat(text):category,priority,done:false});save();close();filter='all';$$('.filter').forEach(b=>b.classList.toggle('on',b.dataset.f==='all'));render();toast('Atividade adicionada e analisada')};$('#agenda').onclick=e=>{let d=e.target.closest('[data-del]');if(d){e.stopPropagation();let x=tasks.find(x=>x.id===d.dataset.del);if(x&&confirm('Excluir “'+x.text+'”?')){tasks=tasks.filter(x=>x.id!==d.dataset.del);save();render();toast('Atividade removida')}return}let r=e.target.closest('[data-toggle]');if(r){let x=tasks.find(x=>x.id===r.dataset.toggle);if(x){x.done=!x.done;save();render();toast(x.done?'Atividade concluída':'Atividade reaberta')}}};$('#agenda').onkeydown=e=>{if((e.key==='Enter'||e.key===' ')&&e.target.closest('[data-toggle]')){e.preventDefault();e.target.closest('[data-toggle]').click()}};$$('.filter').forEach(b=>b.onclick=()=>{filter=b.dataset.f;$$('.filter').forEach(x=>x.classList.toggle('on',x===b));render()});$('#test').onclick=()=>{if(tasks.length&&!confirm('Substituir a agenda atual pelo cenário de teste?'))return;tasks=scenario();save();filter='all';closeMenu();render();toast('Cenário de teste carregado')};$('#clear').onclick=()=>{if(!tasks.length)return closeMenu();if(confirm('Limpar todas as atividades?')){tasks=[];save();closeMenu();render();toast('Agenda limpa')}};save();render()})();
</script>
</body></html>
