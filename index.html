<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#212121">
  <title>Agenda Lagares</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#212121;color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(100%,390px);padding:28px 24px;border:1px solid #454545;border-radius:20px;background:#2f2f2f;box-shadow:0 8px 24px rgba(0,0,0,.28);text-align:center}.mark{width:46px;height:46px;display:grid;place-items:center;margin:0 auto 14px;border-radius:14px;background:#0a84ff;color:#fff;font-weight:850;font-size:20px}.status{margin:10px 0 0;color:#a7a7ac;font-size:14px;line-height:1.45}.error{display:none;margin-top:14px;padding:11px;border-radius:12px;background:#4b2020;color:#ffd6d6;text-align:left;font-size:12px;line-height:1.45}.error code{display:block;margin-top:7px;word-break:break-word;font-size:11px}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">A</div>
    <strong>Carregando Agenda Lagares</strong>
    <p class="status" id="status">Preparando sincronização online…</p>
    <div class="error" id="error"><strong>Não foi possível abrir a agenda.</strong><br>Verifique sua conexão e atualize a página.<code id="detail"></code></div>
  </main>
  <script>
  (async function () {
    const source = 'https://raw.githubusercontent.com/LGRSV/agenda-iphone/44943606ece74105f5cb01c9702a6f98ffc4e580/index.html';
    const cacheName = 'agenda-lagares-base-v1';
    const status = document.getElementById('status');
    const error = document.getElementById('error');
    const detail = document.getElementById('detail');

    async function carregarBase() {
      try {
        const resposta = await fetch(source + '?v=sync-github-1', { cache: 'no-store' });
        if (!resposta.ok) throw new Error('Código-base indisponível (' + resposta.status + ').');
        const copia = resposta.clone();
        if ('caches' in window) {
          caches.open(cacheName).then(function (cache) { return cache.put(source, copia); }).catch(function () {});
        }
        return resposta.text();
      } catch (erro) {
        if ('caches' in window) {
          const salvo = await caches.match(source);
          if (salvo) return salvo.text();
        }
        throw erro;
      }
    }

    try {
      status.textContent = 'Carregando sua agenda e a sincronização online…';
      let html = await carregarBase();
      const recursos = '<script src="./apple-enhance.js?v=15"><\/script><script src="./apple-bridge.js?v=15"><\/script><script src="./sync-github.js?v=1"><\/script>';
      if (!html.includes('</body>')) throw new Error('Estrutura da agenda não reconhecida.');
      html = html.replace('</body>', recursos + '</body>');
      document.open();
      document.write(html);
      document.close();
    } catch (erro) {
      status.textContent = 'A abertura foi interrompida para proteger suas tarefas locais.';
      error.style.display = 'block';
      detail.textContent = String(erro && erro.message ? erro.message : erro);
      console.error('Agenda Lagares:', erro);
    }
  })();
  </script>
</body>
</html>
