<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#212121">
<title>Adicionando tarefas</title>
<style>
:root{--bg:#f6f7f9;--card:#fff;--text:#1d1d1f;--muted:#6e6e73;--accent:#0a84ff}html[data-theme=dark]{--bg:#212121;--card:#2f2f2f;--text:#f5f5f7;--muted:#a7a7ac;--accent:#0a84ff}*{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;padding:24px}.card{width:min(100%,360px);padding:26px 22px;border-radius:22px;background:var(--card);text-align:center;box-shadow:0 12px 28px #0003}.spinner{width:34px;height:34px;margin:0 auto 16px;border:3px solid #ffffff33;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}h1{margin:0;font-size:20px;letter-spacing:-.03em}p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.45}.error .spinner{display:none}.error h1{color:#ff6b68}
</style>
</head>
<body>
<section class="card" id="card"><div class="spinner"></div><h1 id="title">Adicionando tarefas</h1><p id="message">Salvando na sua agenda deste iPhone…</p></section>
<script>
(() => {
  const TASK_KEY = 'agenda_lagares_v3';
  const title = document.getElementById('title');
  const message = document.getElementById('message');
  const card = document.getElementById('card');
  const fail = text => { card.classList.add('error'); title.textContent = 'Não foi possível importar'; message.textContent = text; };
  const decode = token => {
    const normalized = token.replace(/-/g, '+').replace(/_/g, '/');
    const padded = normalized + '='.repeat((4 - normalized.length % 4) % 4);
    const binary = atob(padded);
    const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
    return JSON.parse(new TextDecoder().decode(bytes));
  };
  try {
    const token = new URLSearchParams(location.hash.slice(1)).get('d');
    if (!token) throw new Error('Este link não contém tarefas.');
    const payload = decode(token);
    if (!Array.isArray(payload.tasks) || !payload.tasks.length) throw new Error('Nenhuma tarefa foi encontrada neste link.');
    const current = JSON.parse(localStorage.getItem(TASK_KEY) || '[]');
    const ids = new Set(current.map(task => String(task.id)));
    let added = 0;
    for (const task of payload.tasks) {
      if (!task || !task.id || !task.text || ids.has(String(task.id))) continue;
      current.push(task);
      ids.add(String(task.id));
      added++;
    }
    localStorage.setItem(TASK_KEY, JSON.stringify(current));
    title.textContent = added ? `${added} tarefa${added > 1 ? 's' : ''} adicionada${added > 1 ? 's' : ''}` : 'As tarefas já estavam na agenda';
    message.textContent = 'Voltando para sua agenda…';
    history.replaceState({}, '', location.pathname);
    setTimeout(() => location.replace('./?v=14'), 900);
  } catch (error) {
    fail(error?.message || 'Tente abrir o link novamente.');
  }
})();
</script>
</body>
</html>
