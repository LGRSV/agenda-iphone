<!doctype html><html lang="pt-BR" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#17181c"><title>Financeiro — Agenda Lagares</title><style>
:root{--bg:#17181c;--surface:#202228;--soft:#292c34;--text:#f7f8fb;--muted:#a6acb8;--line:#3b404a;--accent:#ff7f91;--good:#78d88b;--warn:#ffb74d;--danger:#ff9c9c}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Segoe UI,Roboto,sans-serif}.app{width:min(100%,760px);margin:auto;padding:calc(18px + env(safe-area-inset-top)) 16px 30px}.head{display:flex;align-items:center;gap:13px;margin-bottom:20px}.back{width:45px;height:45px;display:grid;place-items:center;border:1px solid var(--line);border-radius:14px;background:var(--surface);color:var(--text);text-decoration:none}.back svg{width:22px;height:22px}.eye{margin:0 0 4px;color:var(--accent);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}h1{margin:0;font-size:28px;letter-spacing:-.045em}.sub{margin:5px 0 0;color:var(--muted);font-size:13px}.hero,.card,.row{border:1px solid var(--line);background:var(--surface)}.hero{padding:18px;border-radius:22px;background:linear-gradient(135deg,#3a2630,var(--surface));margin-bottom:12px}.hero span,.card span{display:block;color:var(--muted);font-size:12px;font-weight:750}.hero b{display:block;margin-top:7px;color:#ff9aaa;font-size:34px;letter-spacing:-.06em}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{padding:14px;border-radius:17px}.card b{display:block;margin-bottom:5px;font-size:21px;letter-spacing:-.04em}.card.good b{color:var(--good)}.card.warn b{color:var(--warn)}.card.danger b{color:var(--danger)}h2{margin:22px 0 8px;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase}.list{border-top:1px solid var(--line)}.row{display:grid;grid-template-columns:1fr auto;gap:10px;padding:12px 3px;border-width:0 0 1px;border-radius:0}.title{font-size:14px;font-weight:700;line-height:1.35}.meta{margin-top:4px;color:var(--muted);font-size:11px;font-weight:700}.value{font-size:14px;font-weight:850;white-space:nowrap}.late{color:var(--danger)}.empty{padding:26px 0;color:var(--muted);text-align:center;font-size:13px}@media(max-width:380px){.grid{grid-template-columns:1fr}.app{padding-left:14px;padding-right:14px}}</style></head><body><main class="app"><header class="head"><a class="back" href="./" aria-label="Voltar para agenda" title="Voltar para agenda"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M7 3v4M17 3v4M3 10h18"/><path d="m9 16 2-2 2 2 3-3"/></svg></a><div><p class="eye">Financeiro</p><h1>Indicadores financeiros</h1><p class="sub">Resumo de lançamentos da agenda</p></div></header><section class="hero"><span>Em aberto</span><b id="open">R$ 0,00</b></section><section class="grid"><div class="card good"><b id="done">R$ 0,00</b><span>Concluído / recebido</span></div><div class="card warn"><b id="month">R$ 0,00</b><span>Pendente neste mês</span></div><div class="card danger"><b id="late">R$ 0,00</b><span>Em atraso</span></div><div class="card"><b id="count">0</b><span>Lançamentos abertos</span></div></section><h2>Próximos lançamentos</h2><section class="list" id="list"></section></main><script>(()=>{const j=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||'')||f}catch{return f}},tasks=j('agenda_lagares_v3',[]),notes=j('agenda_notas_v1',{}),today=new Date().toISOString().slice(0,10),money=n=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n||0),num=v=>{const n=Number(String(v??'').replace(/\./g,'').replace(',','.'));return Number.isFinite(n)?n:0},items=tasks.filter(t=>t?.tag==='financeiro'&&t.text).map(t=>({...t,value:num(notes[t.id]?.valor)})).filter(t=>t.value>0),sum=a=>a.reduce((s,t)=>s+t.value,0),open=items.filter(t=>!t.done),done=items.filter(t=>t.done),late=open.filter(t=>t.date&&t.date<today),month=open.filter(t=>String(t.date||'').startsWith(today.slice(0,7)));document.querySelector('#open').textContent=money(sum(open));document.querySelector('#done').textContent=money(sum(done));document.querySelector('#month').textContent=money(sum(month));document.querySelector('#late').textContent=money(sum(late));document.querySelector('#count').textContent=open.length;const rows=open.sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999'))).slice(0,30);document.querySelector('#list').innerHTML=rows.length?rows.map(t=>{const d=String(t.date||'').split('-');return '<article class="row"><div><div class="title">'+t.text.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))+'</div><div class="meta">'+(d.length===3?d[2]+'/'+d[1]:'—')+(t.time?' · '+t.time:'')+'</div></div><div class="value '+(t.date&&t.date<today?'late':'')+'">'+money(t.value)+'</div></article>'}).join(''):'<div class="empty">Nenhum lançamento financeiro com valor informado.</div>'})();</script></body></html>
