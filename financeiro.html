<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#17181c"><title>Financeiro — Agenda Lagares</title><style>
:root{color-scheme:dark}html,body{margin:0!important;background:#17181c!important;color:#f7f8fb!important;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Segoe UI,Roboto,sans-serif}.app{width:min(100%,760px);margin:auto;padding:calc(18px + env(safe-area-inset-top)) 16px 30px}.head{display:flex;align-items:center;gap:13px;margin-bottom:18px}.back,.monthnav{display:grid;place-items:center;border:1px solid #3b404a;border-radius:14px;background:#202228;color:#f7f8fb;text-decoration:none}.back{width:45px;height:45px;flex:0 0 auto}.back svg{width:22px;height:22px}.eye{margin:0 0 4px;color:#ff7f91;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}h1{margin:0;font-size:28px;letter-spacing:-.045em}.sub{margin:5px 0 0;color:#a6acb8;font-size:13px}.months{display:grid;grid-template-columns:44px 1fr 44px;gap:8px;align-items:center;margin-bottom:12px}.monthnav{height:44px;font-size:25px}.monthname{text-align:center;font-size:15px;font-weight:800;text-transform:capitalize}.hero,.card,.row{border:1px solid #3b404a;background:#202228}.hero{padding:18px;border-radius:22px;background:linear-gradient(135deg,#3a2630,#202228);margin-bottom:12px}.hero span,.card span{display:block;color:#a6acb8;font-size:12px;font-weight:750}.hero b{display:block;margin-top:7px;color:#ff9aaa;font-size:34px;letter-spacing:-.06em}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{padding:14px;border-radius:17px}.card b{display:block;margin-bottom:5px;font-size:21px;letter-spacing:-.04em}.card.good b{color:#78d88b}.card.warn b{color:#ffb74d}.card.danger b{color:#ff9c9c}h2{margin:22px 0 8px;color:#a6acb8;font-size:11px;letter-spacing:.08em;text-transform:uppercase}.list{border-top:1px solid #3b404a}.row{display:grid;grid-template-columns:25px minmax(0,1fr) auto;gap:10px;align-items:start;padding:13px 3px;border-width:0 0 1px;border-radius:0}.check{appearance:none;width:22px;height:22px;margin:1px 0 0;border:1.5px solid #a6acb8;border-radius:7px;background:transparent;display:grid;place-items:center}.check:checked{border-color:#78d88b;background:#78d88b}.check:checked:after{content:"✓";font-weight:900;color:#17181c}.done .title{text-decoration:line-through;color:#a6acb8}.title{font-size:14px;font-weight:700;line-height:1.35}.meta{margin-top:4px;color:#a6acb8;font-size:11px;font-weight:700}.value{font-size:14px;font-weight:850;white-space:nowrap}.late{color:#ff9c9c}.empty{padding:26px 0;color:#a6acb8;text-align:center;font-size:13px}@media(max-width:380px){.grid{grid-template-columns:1fr}.app{padding-left:14px;padding-right:14px}}</style></head><body><main class="app"><header class="head"><a class="back" href="./" aria-label="Voltar para agenda" title="Voltar para agenda"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M7 3v4M17 3v4M3 10h18"/><path d="m9 16 2-2 2 2 3-3"/></svg></a><div><p class="eye">Financeiro</p><h1>Indicadores financeiros</h1><p class="sub">Toque no quadrado para concluir um lançamento.</p></div></header><nav class="months"><button class="monthnav" id="prev" aria-label="Mês anterior">‹</button><div class="monthname" id="monthName"></div><button class="monthnav" id="next" aria-label="Próximo mês">›</button></nav><section class="hero"><span>Em aberto no mês</span><b id="open">R$ 0,00</b></section><section class="grid"><div class="card good"><b id="done">R$ 0,00</b><span>Concluído / recebido</span></div><div class="card warn"><b id="planned">R$ 0,00</b><span>Total previsto</span></div><div class="card danger"><b id="late">R$ 0,00</b><span>Em atraso</span></div><div class="card"><b id="count">0</b><span>Lançamentos em aberto</span></div></section><h2 id="heading">Lançamentos do mês</h2><section class="list" id="list"></section></main><script>(()=>{const TK='agenda_lagares_v3',NK='agenda_notas_v1',DK='agenda_supabase_dirty_v1',j=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||'')||f}catch{return f}},money=n=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n||0),num=v=>{const n=Number(String(v??'').replace(/\./g,'').replace(',','.'));return Number.isFinite(n)?n:0},today=new Date(),state={y:today.getFullYear(),m:today.getMonth()};const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));function key(){return state.y+'-'+String(state.m+1).padStart(2,'0')}function read(){const notes=j(NK,{});return j(TK,[]).filter(t=>t?.tag==='financeiro'&&t.text&&String(t.date||'').startsWith(key())).map(t=>({...t,value:num(notes[t.id]?.valor)})).filter(t=>t.value>0).sort((a,b)=>String(a.date).localeCompare(String(b.date))||String(a.time||'').localeCompare(String(b.time||'')))}function render(){const items=read(),open=items.filter(t=>!t.done),done=items.filter(t=>t.done),now=new Date().toISOString().slice(0,10),sum=a=>a.reduce((s,t)=>s+t.value,0);document.querySelector('#monthName').textContent=new Intl.DateTimeFormat('pt-BR',{month:'long',year:'numeric'}).format(new Date(state.y,state.m,1));document.querySelector('#open').textContent=money(sum(open));document.querySelector('#done').textContent=money(sum(done));document.querySelector('#planned').textContent=money(sum(items));document.querySelector('#late').textContent=money(sum(open.filter(t=>t.date<now)));document.querySelector('#count').textContent=open.length;document.querySelector('#list').innerHTML=items.length?items.map(t=>{const d=t.date.split('-');return '<article class="row '+(t.done?'done':'')+'"><input class="check" type="checkbox" data-id="'+t.id+'" '+(t.done?'checked':'')+'><div><div class="title">'+esc(t.text)+'</div><div class="meta">'+d[2]+'/'+d[1]+(t.time?' · '+t.time:'')+'</div></div><div class="value '+(!t.done&&t.date<now?'late':'')+'">'+money(t.value)+'</div></article>'}).join(''):'<div class="empty">Nenhum lançamento financeiro neste mês.</div>'}function shift(n){state.m+=n;if(state.m<0){state.m=11;state.y--}if(state.m>11){state.m=0;state.y++}render()}document.querySelector('#prev').onclick=()=>shift(-1);document.querySelector('#next').onclick=()=>shift(1);document.querySelector('#list').onchange=e=>{const id=e.target.dataset.id;if(!id)return;const a=j(TK,[]),t=a.find(x=>x.id===id);if(!t)return;t.done=e.target.checked;localStorage.setItem(TK,JSON.stringify(a));const dirty=j(DK,{});dirty.tasks=Date.now();localStorage.setItem(DK,JSON.stringify(dirty));render()};render()})();</script></body></html>
