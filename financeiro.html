 de crédito Inter</option><option value="pix">Pix</option><option value="dinheiro">Dinheiro</option></select><input id="vl" type="number" step="0.01" placeholder="Valor (opcional)"><div class="actions"><button type="button" id="cancel">Cancelar</button><button>Salvar</button></div></form><div class="filters"><button type="button" data-f="todos" class="on">Todos</button><button type="button" data-f="entrada">Entradas</button><button type="button" data-f="saida">Saídas</button></div><h2>LANÇAMENTOS DO MÊS</h2><section class="list" id="list"></section></main><script>(()=>{const TK='agenda_lagares_v3',NK='agenda_notas_v1',DK='agenda_supabase_dirty_v1',j=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||'')||f}catch{return f}},save=(k,v)=>localStorage.setItem(k,JSON.stringify(v)),money=n=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n||0),num=v=>{const n=Number(String(v??'').replace(',','.'));return Number.isFinite(n)?n:0},today=new Date(),st={y:today.getFullYear(),m:today.getMonth()};let filter='todos';const kind=(t,n)=>n.movimento||(/cobrar|sal[aá]rio|receber/i.test(t.text)?'entrada':/mesada|mayara/i.test(t.text)?'saida':'sem valor');const qualifies=(t,n)=>t.tag==='financeiro'||/pintura|cap[oô]/i.test(t.text)||n.movimento;function mark(){const d=j(DK,{});d.tasks=Date.now();d.notes=Date.now();save(DK,d)}function render(){const notes=j(NK,{}),key=st.y+'-'+String(st.m+1).padStart(2,'0'),items=j(TK,[]).filter(t=>t?.text&&String(t.date||'').startsWith(key)&&qualifies(t,notes[t.id]||{})&&!/equipamentos? especiais/i.test(t.text)).map(t=>({...t,n:notes[t.id]||{}})).sort((a,b)=>a.date.localeCompare(b.date)),open=items.filter(t=>!t.done),sum=(a,k)=>a.reduce((s,t)=>s+(kind(t,t.n)===k?num(t.n.valor):0),0),ins=sum(items,'entrada'),outs=sum(items,'saida');document.querySelector('#mn').textContent=new Intl.DateTimeFormat('pt-BR',{month:'long',year:'numeric'}).format(new Date(st.y,st.m,1));document.querySelector('#in').textContent=money(ins);document.querySelector('#out').textContent=money(outs);document.querySelector('#saldo').textContent=money(ins-outs);document.querySelector('#nv').textContent=items.filter(t=>!num(t.n.valor)).length;document.querySelector('#ct').textContent=open.length;(function(){var inter=items.filter(function(t){return kind(t,t.n)==='saida'&&t.n.forma==='inter'&&num(t.n.valor)>0}),tot=inter.reduce(function(s,t){return s+num(t.n.valor)},0),c=document.querySelector('#cartao'),mm=String(st.m+1).padStart(2,'0');c.hidden=false;c.innerHTML='<div class="ct-top"><span class="ct-brand">Cartão de crédito Inter</span><span class="ct-due">Vence 02/'+mm+'</span></div><div class="ct-val">'+money(tot)+'</div><div class="ct-sub">'+inter.length+' compra'+(inter.length===1?'':'s')+' neste mês · fatura</div>'})();const shown=items.filter(t=>filter==='todos'||(kind(t,t.n)===filter&&num(t.n.valor)>0));document.querySelector('#list').innerHTML=shown.length?shown.map(t=>{const d=t.date.split('-'),k=kind(t,t.n),v=num(t.n.valor);return '<article class="row '+(t.done?'done':'')+'"><input class="check" type="checkbox" data-i="'+t.id+'" '+(t.done?'checked':'')+'><div><div class="title">'+t.text.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))+'</div><div class="meta">'+d[2]+'/'+d[1]+'/'+d[0]+(t.time?' '+t.time:'')+' · '+(k==='entrada'?'Entrada':k==='saida'?('Saída'+(t.n.forma?' · '+({inter:'Cartão Inter',pix:'Pix',dinheiro:'Dinheiro'}[t.n.forma]||''):'')):'Sem valor')+'</div></div><div class="value '+(k==='entrada'?'entrada':k==='saida'?'saida':'none')+'">'+(v?money(v):'—')+'</div></article>'}).join(''):'<div class="empty">Nenhum lançamento neste filtro.</div>'}function shift(x){st.m+=x;if(st.m<0){st.m=11;st.y--}if(st.m>11){st.m=0;st.y++}render()}document.querySelector('#prev').onclick=()=>shift(-1);document.querySelector('#next').onclick=()=>shift(1);document.querySelector('.filters').onclick=e=>{const b=e.target.closest('[data-f]');if(!b)return;filter=b.dataset.f;document.querySelectorAll('[data-f]').for
